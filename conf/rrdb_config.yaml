model:
  type: rrdbnet
  input_channels: 10
  sr_factor: 4

  rrdb_num_blocks: 23
  rrdb_block_selection: [22]
  rrdb_network_features: 64
  rrdb_intermediate_features: 32
  rrdb_channels: 64  # rrdb_network_features * len(rrdb_block_selection)

  prior: gaussian

train:
  use_cuda: true
  tensorboard: true
  random_seed: null
  distributed: false

  dataset: Asia_LO
  epochs: 500
  batch_size: 16
  train_image_size: 64
  lr: 1.0e-4
  lr_decay_factor: 0.5
  lr_decay_epochs: [300, 400, 450]
  lr_warmup_steps: 500
  clip_grad_value: 10

  visualize_batch_size: 16
  test_interval: 50
  val_images_interval: 1
  checkpoint_backup_interval: 100
